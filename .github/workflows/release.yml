name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create .deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          ./packaging/deb/build.sh ${{ steps.version.outputs.VERSION }} amd64

      - name: Create .rpm package
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          ./packaging/rpm/build.sh ${{ steps.version.outputs.VERSION }} x86_64

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tux_${{ steps.version.outputs.VERSION }}_amd64.deb
            tux-${{ steps.version.outputs.VERSION }}.x86_64.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
